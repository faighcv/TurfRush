services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: turfuser
      POSTGRES_PASSWORD: turfpass
      POSTGRES_DB: turfdb
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U turfuser -d turfdb']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
